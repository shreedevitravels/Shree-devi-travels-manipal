<!DOCTYPE html>
<html>
<head>
  <title>Shree Devi Travels Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #0ea5e9, #2563eb);
      color: white;
      text-align: center;
      padding-top: 60px;
    }

    .logo {
      width: 100px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 22px;
      margin: 5px 0;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 20px;
    }

    .box {
      background: rgba(0,0,0,0.4);
      padding: 20px;
      border-radius: 15px;
      width: 90%;
      max-width: 350px;
      margin: auto;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 25px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 25px;
      border: none;
      background: #0ea5e9;
      color: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    .link-btn {
      background: transparent;
      border: 1px solid white;
      margin-top: 10px;
    }

    /* 🔔 ALERT STYLE */
    .alert-box {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .alert-content {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 15px;
      width: 80%;
      max-width: 300px;
      text-align: center;
      animation: popup 0.3s ease;
    }

    .alert-content button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      background: #0ea5e9;
      color: white;
      border-radius: 10px;
    }

    @keyframes popup {
      from {transform: scale(0.7);}
      to {transform: scale(1);}
    }
  </style>
</head>

<body>

<!-- 🖼️ YOUR LOGO -->
<img src="logo.png" class="logo">

<!-- 🏷️ TITLE -->
<h1>Shree Devi Travels Manipal</h1>
<div class="subtitle">Login to continue</div>

<!-- 📦 LOGIN BOX -->
<div class="box">
  <input id="phone" placeholder="Enter Phone Number">

  <button onclick="login()">Login</button>

  <button class="link-btn" onclick="goSignup()">Create Account</button>
</div>

<!-- 🔔 CUSTOM ALERT -->
<div id="customAlert" class="alert-box">
  <div class="alert-content">
    <p id="alertText"></p>
    <button onclick="closeAlert()">OK</button>
  </div>
</div>

<script>
function showAlert(message) {
  document.getElementById("alertText").innerText = message;
  document.getElementById("customAlert").style.display = "flex";
}

function closeAlert() {
  document.getElementById("customAlert").style.display = "none";
}

function login() {
  const phone = document.getElementById("phone").value.trim();
  const user = JSON.parse(localStorage.getItem("user"));

  if(!user){
    showAlert("No account found ❌");
    return;
  }

  if(user.phone === phone){
    showAlert("Login Success ✅");
    setTimeout(() => {
      window.location.href = "index.html";
    }, 1000);
  } else {
    showAlert("Invalid phone number ❌");
  }
}

function goSignup(){
  window.location.href = "signup.html";
}
</script>

</body>
</html>
